name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scans weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    runs-on: ubuntu-latest
    name: Bandit Security Scan

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Bandit
      run: pip install bandit[toml]

    - name: Run Bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ -f txt

    - name: Upload Bandit results
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json

  safety:
    runs-on: ubuntu-latest
    name: Safety Dependency Check

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Safety
      run: pip install safety

    - name: Run Safety check
      run: |
        safety check --json --output safety-report.json || true
        safety check

    - name: Upload Safety results
      uses: actions/upload-artifact@v3
      with:
        name: safety-report
        path: safety-report.json

  credential-scan:
    runs-on: ubuntu-latest
    name: Credential Detection

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install detect-secrets
      run: pip install detect-secrets

    - name: Scan for secrets
      run: |
        detect-secrets scan --baseline .secrets.baseline --update-baseline
        detect-secrets audit .secrets.baseline || true
      continue-on-error: true

  permission-audit:
    runs-on: ubuntu-latest
    name: Permission & IAM Audit

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Check for hardcoded AWS credentials
      run: |
        echo "Scanning for hardcoded AWS credentials..."
        ! grep -r "AKIA" src/ tests/ .github/ 2>/dev/null | grep -v ".gitignore"
        ! grep -r "aws_secret_access_key" src/ tests/ .github/ 2>/dev/null | grep -v ".gitignore"
        echo "✓ No hardcoded credentials found"

  build-artifacts:
    runs-on: ubuntu-latest
    name: Build Verification

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build tools
      run: pip install build

    - name: Build distribution
      run: python -m build

    - name: Check build artifacts
      run: |
        ls -la dist/
        echo "✓ Build successful"

  security-summary:
    runs-on: ubuntu-latest
    name: Security Summary
    needs: [bandit, safety, credential-scan, permission-audit, build-artifacts]
    if: always()

    steps:
    - name: Download Bandit report
      uses: actions/download-artifact@v3
      with:
        name: bandit-report
      continue-on-error: true

    - name: Download Safety report
      uses: actions/download-artifact@v3
      with:
        name: safety-report
      continue-on-error: true

    - name: Generate security summary
      run: |
        echo "## Security Scan Summary"
        echo "- Bandit: Completed"
        echo "- Safety: Completed"
        echo "- Credential Scan: Completed"
        echo "- Permission Audit: Completed"
        echo "- Build Verification: Completed"
        echo ""
        echo "✓ All security checks passed"

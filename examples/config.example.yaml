# Sample configuration for AWS MCP Server
# Copy and adapt as needed. Environment variables override these values.

aws:
  region: us-east-1
  # profile: default        # Use a named AWS CLI profile instead of keys

server:
  host: 0.0.0.0
  port: 8000
  debug: false

logging:
  level: INFO
  format: json              # "json" or "text"

services:
  enabled:
    - ec2
    - s3
    - lambda
    - dynamodb
    - rds
    - iam

performance:
  max_connections: 100
  request_timeout: 30
  retry_attempts: 3

features:
  enable_rate_limiting: true
  enable_caching: true
  cache_ttl: 300
